version: "3.7"
services:
  brave_browser:
    image: lscr.io/linuxserver/brave:latest
    container_name: myapps-brave
    privileged: true
    security_opt:
      - seccomp:unconfined
    shm_size: "1gb"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - UMASK=022
    volumes:
      - ${APP_DATA_DIR}/data:/config
      - /run/udev/data:/run/udev/data:ro
      # THE NUKE: Maps the entire host device tree in real-time
      - /dev:/dev 
    ports:
      - "3935:3001"
    restart: unless-stopped
